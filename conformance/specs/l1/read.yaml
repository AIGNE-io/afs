name: "read - existing text file"
operation: read
params:
  path: "/hello.txt"
expect:
  success: true
  data:
    data:
      content: "Hello, World!"
      path: "$exists"
      meta:
        size:
          gte: 1
---
name: "read - not found"
operation: read
params:
  path: "/nonexistent.txt"
expect:
  success: false
  error:
    code: 1
---
name: "read - json file"
operation: read
params:
  path: "/data.json"
expect:
  success: true
  data:
    data:
      content: "$contains:value"
      path: "$exists"
---
name: "read - nested file"
operation: read
params:
  path: "/docs/readme.md"
expect:
  success: true
  data:
    data:
      content: "$contains:# Test"
      path: "$exists"
---
name: "read - with line range"
operation: read
params:
  path: "/lines.txt"
  options:
    startLine: 2
    endLine: 4
expect:
  success: true
  data:
    data:
      content: "$contains:line2"
---
name: "read - directory path"
operation: read
params:
  path: "/docs"
expect:
  success: true
  data:
    data:
      path: "$exists"
