name: "stat - existing file"
operation: stat
params:
  path: "/hello.txt"
expect:
  success: true
  data:
    data:
      path: "$exists"
      meta:
        size:
          gte: 1
---
name: "stat - existing directory"
operation: stat
params:
  path: "/docs"
expect:
  success: true
  data:
    data:
      path: "$exists"
---
name: "stat - not found"
operation: stat
params:
  path: "/nonexistent.txt"
expect:
  success: false
  error:
    code: 1
