name: "workflow - write, rename, read from new and old path"
steps:
  - name: write original file
    operation: write
    params:
      path: "/integ-rename-src.txt"
      content:
        content: "rename me please"
    expect:
      success: true
  - name: rename file
    operation: rename
    params:
      path: "/integ-rename-src.txt"
      newPath: "/integ-rename-dst.txt"
    expect:
      success: true
  - name: read from new path
    operation: read
    params:
      path: "/integ-rename-dst.txt"
    expect:
      success: true
      data:
        data:
          content: "$contains:rename me please"
  - name: read from old path should fail
    operation: read
    params:
      path: "/integ-rename-src.txt"
    expect:
      success: false
  - name: cleanup
    operation: delete
    params:
      path: "/integ-rename-dst.txt"
    expect:
      success: true
---
name: "workflow - write, append, read combined content"
steps:
  - name: write initial content
    operation: write
    params:
      path: "/integ-append-test.txt"
      content:
        content: "first-part"
    expect:
      success: true
  - name: append more content
    operation: write
    params:
      path: "/integ-append-test.txt"
      content:
        content: "-second-part"
      options:
        mode: "append"
    expect:
      success: true
  - name: read and verify combined
    operation: read
    params:
      path: "/integ-append-test.txt"
    expect:
      success: true
      data:
        data:
          content: "$contains:first-part"
  - name: verify second part present
    operation: read
    params:
      path: "/integ-append-test.txt"
    expect:
      success: true
      data:
        data:
          content: "$contains:second-part"
  - name: cleanup
    operation: delete
    params:
      path: "/integ-append-test.txt"
    expect:
      success: true
---
name: "workflow - write, stat, delete, stat again"
steps:
  - name: write file
    operation: write
    params:
      path: "/integ-stat-cycle.txt"
      content:
        content: "stat me then delete"
    expect:
      success: true
  - name: stat should show size
    operation: stat
    params:
      path: "/integ-stat-cycle.txt"
    expect:
      success: true
      data:
        data:
          meta:
            size:
              gte: 1
  - name: delete file
    operation: delete
    params:
      path: "/integ-stat-cycle.txt"
    expect:
      success: true
  - name: stat again should fail
    operation: stat
    params:
      path: "/integ-stat-cycle.txt"
    expect:
      success: false
