name: "find and publish sends to topic"
script: |
  job emit {
    find /data
    | publish /events
  }
mockWorld:
  read:
    /data:
      - { type: "click", target: "button" }
      - { type: "hover", target: "link" }
expected:
  status: "ok"
  recordCount: 0
  publishes:
    /events:
      - { type: "click", target: "button" }
      - { type: "hover", target: "link" }
