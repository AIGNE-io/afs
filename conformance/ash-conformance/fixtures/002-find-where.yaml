name: "find with where filters records"
script: |
  job active_users {
    find /data
    | where status == "active"
  }
mockWorld:
  read:
    /data:
      - { id: 1, name: "alice", status: "active" }
      - { id: 2, name: "bob", status: "inactive" }
      - { id: 3, name: "carol", status: "active" }
      - { id: 4, name: "dave", status: "inactive" }
expected:
  status: "ok"
  recordCount: 2
