name: "find and save writes to destination"
script: |
  job copy {
    find /src
    | save /dst
  }
mockWorld:
  read:
    /src:
      - { id: 1, value: "a" }
      - { id: 2, value: "b" }
expected:
  status: "ok"
  recordCount: 0
  writes:
    /dst:
      - { id: 1, value: "a" }
      - { id: 2, value: "b" }
