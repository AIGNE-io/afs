name: "chained where stages narrow results"
script: |
  job chain {
    find /data
    | where a == 1
    | where b == "x"
  }
mockWorld:
  read:
    /data:
      - { a: 1, b: "x", c: "yes" }
      - { a: 1, b: "y", c: "no" }
      - { a: 2, b: "x", c: "no" }
      - { a: 1, b: "x", c: "also" }
      - { a: 2, b: "y", c: "no" }
expected:
  status: "ok"
  recordCount: 2
